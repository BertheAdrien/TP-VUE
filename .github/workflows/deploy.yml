name: Deploy Vue App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/debian

            if [ ! -d "vue-app/.git" ]; then
              git clone https://github.com/BertheAdrien/TP-VUE.git vue-app
            fi

            cd vue-app

            git config --global --add safe.directory /home/debian/vue-app
            git pull origin main

            docker build --no-cache -t vue-app .

            docker stop vue-app || true
            docker rm vue-app || true

            docker run -d -p 8080:80 --name vue-app vue-app