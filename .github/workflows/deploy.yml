name: Deploy Vue + API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/debian/vue-app

            # Si le repo n'existe pas encore, le cloner
            if [ ! -d ".git" ]; then
              git clone git@github.com:BertheAdrien/TP-VUE.git . -c core.sshCommand="ssh -i ~/.ssh/github_deploy"
            fi

            # Pull des dernières modifications
            git config --global --add safe.directory /home/debian/vue-app
            git -c core.sshCommand="ssh -i ~/.ssh/github_deploy -o StrictHostKeyChecking=no" pull

            # Rebuild et relancer tous les conteneurs
            docker-compose down
            docker-compose up -d --build

            # Vérification post-déploiement
            echo " Vérification de l'API..."
            timeout 30 bash -c 'until curl -f http://localhost:3000/users; do sleep 5; done'
            
            echo " Vérification du frontend..."
            timeout 30 bash -c 'until curl -f http://localhost:8080; do sleep 5; done'
            
            echo " Déploiement et vérifications terminés!"