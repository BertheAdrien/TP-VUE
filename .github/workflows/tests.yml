name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Run tests
      working-directory: ./backend
      run: npm run test
    
    - name: Run tests with coverage
      working-directory: ./backend
      run: npm run test:coverage

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run unit tests
      run: npm run test:unit
    
    - name: Run tests with coverage
      run: npm run test:unit -- --coverage
    
    - name: Build application
      run: npm run build
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    services:
      # Service pour le backend
      backend:
        image: node:20
        ports:
          - 3000:3000
        options: >-
          --health-cmd "curl -f http://localhost:3000/users || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Start backend
      working-directory: ./backend
      run: npm start &
      env:
        PORT: 3000
    
    - name: Wait for backend
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:3000/users; do sleep 2; done'
    
    - name: Install frontend dependencies
      run: npm ci
    
    - name: Run API integration tests
      run: |
        # Tests d'intégration API
        curl -f http://localhost:3000/users
        curl -f http://localhost:3000/users/1
    
    - name: Test frontend API calls
      run: |
        # Simuler les appels API du frontend
        node -e "
        const fetch = require('node-fetch');
        fetch('http://localhost:3000/users')
          .then(res => res.json())
          .then(data => {
            console.log('API Response:', data);
            if (!Array.isArray(data)) throw new Error('API should return array');
            if (data.length === 0) throw new Error('API should return users');
            console.log('✅ Integration tests passed');
          })
          .catch(err => {
            console.error('❌ Integration test failed:', err);
            process.exit(1);
          });
        "

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
